version: 2

updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    # Group minor/patch updates into a single PR to reduce noise
    groups:
      dev-dependencies:
        patterns:
          - "flake8*"
          - "black"
          - "bandit"
          - "mypy"
        update-types:
          - "minor"
          - "patch"
      test-dependencies:
        patterns:
          - "pytest*"
          - "hypothesis"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 5
