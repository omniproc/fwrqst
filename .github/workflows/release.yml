name: Release
run-name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Add PyPI link to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          body=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body)
          footer=$'\n---\n📦 `pip install fwrqst=='"$VERSION"'` | [PyPI](https://pypi.org/project/fwrqst/'"$VERSION"'/)'
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "${body}${footer}"
