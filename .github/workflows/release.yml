name: Release
run-name: Release pipeline

on:
  workflow_run:
    workflows: ["Package Build"]
    types: [completed]
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

  # ── PyPI publish ──────────────────────────────────────────────────────
  # Triggered separately by the GitHub Release that release-please creates.
  # This ensures the git tag exists before building, so setuptools_scm
  # derives the correct version from the tag (e.g. v1.2.0 → 1.2.0).
  #
  # To enable:
  #   1. Uncomment the workflow below
  #   2. Configure PyPI trusted publishing (see README § Post-setup)
  #   3. Create a "pypi" environment in GitHub repo settings
  #
  # publish:
  #   # This job is defined as a separate workflow trigger. Move it to a
  #   # dedicated file (.github/workflows/publish.yml) and set:
  #   #
  #   #   on:
  #   #     release:
  #   #       types: [published]
  #   #
  #   # See publish.yml.disabled in this directory for the ready-to-use workflow.
